version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weeklyGoals-api
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    driver: bridge